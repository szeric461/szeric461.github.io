<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hobbi</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        /* Menüsor kiegészítve az új játékhoz */
        .game-selector {
            background: #2d2d2d;
            padding: 15px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap; /* Mobilbarát: ha sok gomb van, több sorba rendezi */
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 100;
        }

        button {
            padding: 10px 20px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #444;
            color: #ccc;
            transition: all 0.3s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        @media (max-width: 480px) {
            button { padding: 8px 12px; font-size: 13px; }
            .game-selector { padding: 10px; gap: 8px; }
        }

        button:hover {
            background: #61dafb;
            color: #000;
            transform: translateY(-2px);
        }

        button.active {
            background: #61dafb;
            color: #20232a;
            box-shadow: 0 0 15px rgba(97, 218, 251, 0.5);
        }

        .game-viewport {
            flex-grow: 1;
            width: 100%;
            border: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ── LANDING OVERLAY ── */
        #landing {
            position: fixed;
            inset: 0;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            z-index: 999;
        }

        #landing h1 {
            color: #61dafb;
            font-size: 2.2em;
            text-align: center;
        }

        #landing p {
            color: #aaa;
            font-size: 1em;
        }

        .landing-cards {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .landing-card {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 16px;
            padding: 36px 40px;
            cursor: pointer;
            text-align: center;
            transition: all 0.25s;
            min-width: 200px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        @media (max-width: 480px) {
            .landing-card { padding: 20px 24px; min-width: 0; width: 100%; max-width: 320px; }
            .landing-cards { flex-direction: column; align-items: center; gap: 14px; }
            #landing h1 { font-size: 1.6em; }
        }

        .landing-card:hover {
            border-color: #61dafb;
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(97,218,251,0.25);
        }

        .landing-card .lc-icon { font-size: 3em; margin-bottom: 12px; }
        .landing-card .lc-title { font-size: 1.2em; font-weight: bold; color: #61dafb; }
        .landing-card .lc-sub { font-size: 0.85em; color: #888; margin-top: 6px; }
    </style>
</head>
<body>

    <!-- LANDING KÉPERNYŐ -->
    <div id="landing">
        <h1>Hobbi cuccok</h1>
        <p>Válassz egy szekciót!</p>
        <div class="landing-cards">
            <div class="landing-card" onclick="openSection('games')">
                <div class="lc-icon">🎮</div>
                <div class="lc-title">Játékok</div>
                <div class="lc-sub">Snake · Pontösszekötő · AutoTuning</div>
            </div>
            <div class="landing-card" onclick="openSection('kviz')">
                <div class="lc-icon">📚</div>
                <div class="lc-title">Szakmasztár kérdések</div>
                <div class="lc-sub">108 kérdés · 300 pont · 4 témakör</div>
            </div>
        </div>
    </div>

    <!-- JÁTÉK SZEKCIÓ -->
    <div class="game-selector" id="game-selector" style="display:none">
        <button onclick="openLanding()" style="background:#333;color:#aaa">🏠 Főmenü</button>
        <button id="btn-snake" onclick="loadGame('snake.html', 'btn-snake')">🐍 Snake</button>
        <button id="btn-dots" onclick="loadGame('pontok.html', 'btn-dots')">📍 Pontösszekötő</button>
        <button id="btn-tuning" onclick="loadGame('autotuning.html', 'btn-tuning')">🚗 AutoTuning</button>
    </div>

    <iframe id="game-frame" class="game-viewport" style="display:none"></iframe>

    <script>
        function openSection(section) {
            document.getElementById('landing').style.display = 'none';

            if (section === 'games') {
                document.getElementById('game-selector').style.display = 'flex';
                document.getElementById('game-frame').style.display = 'block';
                loadGame('snake.html', 'btn-snake');
            } else {
                document.getElementById('game-selector').style.display = 'none';
                document.getElementById('game-frame').style.display = 'block';
                document.getElementById('game-frame').src = 'kviz.html';
            }
        }

        function openLanding() {
            document.getElementById('landing').style.display = 'flex';
            document.getElementById('game-selector').style.display = 'none';
            document.getElementById('game-frame').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }

        function loadGame(url, btnId) {
            document.getElementById('game-frame').src = url;
            const buttons = document.querySelectorAll('.game-selector button');
            buttons.forEach(btn => btn.classList.remove('active'));
            document.getElementById(btnId).classList.add('active');
        }
    </script>

</body>
</html>
