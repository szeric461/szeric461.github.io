<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Varázs Színező</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%; height: 100dvh;
            background: #0d0d1a;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #e0e0f0;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body { display: flex; flex-direction: column; }

        /* ── TOP HUD ── */
        #top-hud {
            display: flex;
            align-items: center;
            padding: 7px 12px;
            background: rgba(8,8,20,0.97);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            gap: 10px;
            flex-shrink: 0;
            min-height: 50px;
        }

        #hud-level {
            font-size: 0.82em;
            font-weight: 700;
            color: #aa66ff;
            white-space: nowrap;
            letter-spacing: 0.04em;
        }

        #hud-emoji { font-size: 1.4em; }

        #progress-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        #progress-bar-bg {
            background: rgba(255,255,255,0.07);
            border-radius: 10px;
            height: 7px;
            overflow: hidden;
        }

        #progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #aa66ff, #00f5ff);
            border-radius: 10px;
            transition: width 0.4s ease;
            width: 0%;
        }

        #progress-text {
            font-size: 0.62em;
            color: #334;
            letter-spacing: 0.05em;
        }

        .hud-btn {
            padding: 5px 11px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            color: #556;
            border-radius: 7px;
            cursor: pointer;
            font-size: 0.73em;
            font-weight: 600;
            letter-spacing: 0.03em;
            transition: all 0.18s;
            white-space: nowrap;
            touch-action: manipulation;
        }
        .hud-btn:hover, .hud-btn:active {
            color: #aab;
            background: rgba(255,255,255,0.09);
            border-color: rgba(255,255,255,0.18);
        }

        #stars-display {
            font-size: 1.1em;
            letter-spacing: 2px;
            color: #ffd700;
        }

        /* ── SVG AREA ── */
        #svg-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            min-height: 0;
        }

        #coloring-svg {
            width: 100%;
            height: 100%;
            max-width: 420px;
            max-height: 100%;
            display: block;
            /* SVG element styles applied below */
        }

        /* All clickable SVG regions */
        #coloring-svg [data-region] {
            cursor: pointer;
            stroke: #1a1a2e;
            stroke-width: 1.8px;
            stroke-linejoin: round;
            stroke-linecap: round;
            transition: filter 0.1s, fill 0.25s ease;
            fill: #d0d0d8;
        }

        #coloring-svg [data-region]:hover {
            filter: brightness(1.15) drop-shadow(0 0 5px rgba(255,255,255,0.25));
        }

        #coloring-svg [data-region].correct-flash {
            animation: correctFlash 0.5s ease;
        }

        @keyframes correctFlash {
            0%   { filter: brightness(1.5) drop-shadow(0 0 8px #00ff88); }
            100% { filter: brightness(1); }
        }

        #coloring-svg [data-region].wrong-flash {
            animation: wrongFlash 0.4s ease;
        }

        @keyframes wrongFlash {
            0%   { filter: brightness(0.5) drop-shadow(0 0 6px #ff0044); }
            100% { filter: brightness(1); }
        }

        /* Decorative elements (no data-region, no click) */
        #coloring-svg .deco {
            fill: none;
            stroke: #1a1a2e;
            stroke-width: 1.5px;
            pointer-events: none;
        }

        /* ── PALETTE BAR ── */
        #palette-bar {
            background: rgba(8,8,20,0.97);
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 8px 10px 10px;
            flex-shrink: 0;
        }

        #palette-label {
            font-size: 0.6em;
            color: #2a2a40;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 7px;
        }

        #palette-swatches {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            justify-content: flex-start;
        }

        .swatch {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.12);
            transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
            touch-action: manipulation;
            flex-shrink: 0;
            position: relative;
        }

        .swatch:hover { transform: scale(1.12); }

        .swatch.active {
            border-color: #fff;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.25), 0 0 12px var(--sc, rgba(255,255,255,0.3));
            transform: scale(1.15);
        }

        .swatch.eraser {
            background: #d0d0d8 !important;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        /* ── LEVEL SELECT SCREEN ── */
        #level-select {
            position: fixed;
            inset: 0;
            background: linear-gradient(160deg, #0d0d1a 0%, #1a0d2e 100%);
            z-index: 30;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 22px;
            padding: 20px;
        }

        #level-select h1 {
            font-size: clamp(1.6em, 6vw, 2.6em);
            font-weight: 900;
            background: linear-gradient(135deg, #aa66ff, #00f5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            letter-spacing: 0.06em;
        }

        .level-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 480px;
        }

        .level-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px;
            padding: 14px 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        .level-card:hover, .level-card:active {
            background: rgba(170,102,255,0.1);
            border-color: rgba(170,102,255,0.4);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(170,102,255,0.15);
        }
        .level-card .lc-emoji { font-size: 2em; display: block; margin-bottom: 5px; }
        .level-card .lc-name { font-size: 0.72em; font-weight: 700; color: #aab; }
        .level-card .lc-diff {
            font-size: 0.58em; color: #445; margin-top: 3px;
            text-transform: uppercase; letter-spacing: 0.06em;
        }
        .level-card .lc-stars { font-size: 0.8em; margin-top: 4px; color: #ffd700; }
        .level-card.locked { opacity: 0.3; cursor: default; pointer-events: none; }

        @media (max-width: 360px) {
            .level-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* ── WIN MODAL ── */
        #win-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.78);
            backdrop-filter: blur(6px);
            z-index: 40;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #win-modal.visible { display: flex; }

        #win-box {
            background: linear-gradient(160deg, #130d24, #0d0d1a);
            border: 1px solid rgba(170,102,255,0.3);
            border-radius: 22px;
            padding: 32px 28px;
            max-width: 340px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 60px rgba(170,102,255,0.2);
        }

        #win-emoji { font-size: 3.5em; margin-bottom: 8px; display: block; }

        #win-title {
            font-size: 1.8em;
            font-weight: 900;
            color: #aa66ff;
            text-shadow: 0 0 25px #aa66ff;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
        }

        #win-sub {
            color: #445;
            font-size: 0.82em;
            margin-bottom: 14px;
        }

        #win-stars {
            font-size: 2.6em;
            letter-spacing: 6px;
            margin-bottom: 18px;
            display: block;
        }

        .win-btn {
            display: block;
            width: 100%;
            padding: 13px;
            margin-top: 10px;
            border-radius: 11px;
            font-size: 1em;
            font-weight: 700;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: all 0.18s;
            touch-action: manipulation;
        }

        .win-btn.primary {
            background: linear-gradient(135deg, #aa66ff, #7733dd);
            border: none;
            color: #fff;
            box-shadow: 0 4px 20px rgba(170,102,255,0.35);
        }
        .win-btn.primary:hover { filter: brightness(1.15); }

        .win-btn.secondary {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: #556;
        }
        .win-btn.secondary:hover { color: #aab; border-color: rgba(255,255,255,0.2); }

        /* ── HINT OVERLAY ── */
        #hint-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 5;
            transition: opacity 0.4s;
            opacity: 0;
        }
        #hint-overlay.visible { opacity: 1; }

        /* ── CONFETTI CANVAS ── */
        #confetti-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 35;
        }

        /* ── TOOLTIP ── */
        #color-tooltip {
            position: fixed;
            bottom: 96px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 5px 14px;
            border-radius: 100px;
            font-size: 0.75em;
            pointer-events: none;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        #color-tooltip.show { opacity: 1; }

        /* ── COLOR NEEDED BADGE ── */
        #needed-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 6px 10px;
            font-size: 0.72em;
            color: #778;
            display: none;
            pointer-events: none;
            z-index: 5;
        }

        @media (max-width: 400px) {
            .swatch { width: 36px; height: 36px; }
            #palette-swatches { gap: 5px; }
        }
    </style>
</head>
<body>

<!-- CONFETTI -->
<canvas id="confetti-canvas"></canvas>

<!-- LEVEL SELECT -->
<div id="level-select">
    <h1>🎨 Varázs Színező</h1>
    <p style="color:#2a2a45;font-size:0.8em;letter-spacing:0.08em;text-transform:uppercase;">Válassz pályát!</p>
    <div class="level-grid" id="level-grid"></div>
</div>

<!-- TOP HUD (game) -->
<div id="top-hud" style="display:none">
    <span id="hud-emoji"></span>
    <div class="progress-wrap" style="flex:1;display:flex;flex-direction:column;gap:3px">
        <div id="progress-bar-bg"><div id="progress-bar"></div></div>
        <div id="progress-text">0 / 0 terület kiszínezve</div>
    </div>
    <span id="stars-display">☆☆☆</span>
    <button class="hud-btn" id="btn-hint" title="Mutasd meg röviden a helyes színeket">💡 Tipp</button>
    <button class="hud-btn" id="btn-levels">📋 Pályák</button>
</div>

<!-- SVG AREA (game) -->
<div id="svg-area" style="display:none">
    <svg id="coloring-svg" viewBox="0 0 360 420" preserveAspectRatio="xMidYMid meet"
         xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="hint-overlay"></div>
    <div id="needed-badge" id="needed-badge"></div>
</div>

<!-- PALETTE BAR (game) -->
<div id="palette-bar" style="display:none">
    <div id="palette-label">Szín kiválasztása → kattints a területre</div>
    <div id="palette-swatches"></div>
</div>

<!-- WIN MODAL -->
<div id="win-modal">
    <div id="win-box">
        <span id="win-emoji"></span>
        <div id="win-title">Kész!</div>
        <div id="win-sub"></div>
        <span id="win-stars"></span>
        <button class="win-btn primary" id="btn-next-level">Következő pálya →</button>
        <button class="win-btn secondary" id="btn-retry">↺ Újra</button>
        <button class="win-btn secondary" id="btn-to-levels">📋 Pályaválasztó</button>
    </div>
</div>

<!-- TOOLTIP -->
<div id="color-tooltip"></div>

<script>
// ═══════════════════════════════════════════════════════
//  VARÁZS SZÍNEZŐ — Paint-by-number / Coloring Game
// ═══════════════════════════════════════════════════════

// ── Level data ──────────────────────────────────────────

    svgContent: () => `

// ═══════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════

let currentLevelIdx = 0;
let regionColors    = {};   // { regionId: appliedColor }
let selectedColor   = null;
let mistakes        = 0;
let hintsUsed       = 0;
let bestStars       = JSON.parse(localStorage.getItem('szinezo_stars') || '{}');
let hintTimer       = null;

const svgEl         = document.getElementById('coloring-svg');
const progressBar   = document.getElementById('progress-bar');
const progressText  = document.getElementById('progress-text');
const starsDisplay  = document.getElementById('stars-display');
const winModal      = document.getElementById('win-modal');
const paletteRow    = document.getElementById('palette-swatches');
const tooltip       = document.getElementById('color-tooltip');

// ═══════════════════════════════════════════════════════
//  SCREENS
// ═══════════════════════════════════════════════════════

function showLevelSelect() {
    winModal.classList.remove('visible');
    document.getElementById('level-select').style.display = 'flex';
    document.getElementById('top-hud').style.display      = 'none';
    document.getElementById('svg-area').style.display     = 'none';
    document.getElementById('palette-bar').style.display  = 'none';
    buildLevelGrid();
}

function showGame() {
    document.getElementById('level-select').style.display = 'none';
    document.getElementById('top-hud').style.display      = 'flex';
    document.getElementById('svg-area').style.display     = 'flex';
    document.getElementById('palette-bar').style.display  = 'block';
}

function buildLevelGrid() {
    const grid = document.getElementById('level-grid');
    grid.innerHTML = '';
    LEVELS.forEach((lv, i) => {
        const best = bestStars[i] || 0;
        const card = document.createElement('div');
        card.className = 'level-card';
        card.innerHTML = `
            <span class="lc-emoji">${lv.emoji}</span>
            <div class="lc-name">${lv.name}</div>
            <div class="lc-diff">${lv.difficulty}</div>
            <div class="lc-stars">${best > 0 ? '★'.repeat(best) + '☆'.repeat(3-best) : '☆☆☆'}</div>
        `;
        card.addEventListener('click', () => startLevel(i));
        grid.appendChild(card);
    });
}

// ═══════════════════════════════════════════════════════
//  LEVEL LOAD
// ═══════════════════════════════════════════════════════

function startLevel(idx) {
    currentLevelIdx = idx;
    regionColors    = {};
    mistakes        = 0;
    hintsUsed       = 0;
    selectedColor   = null;

    const lv = LEVELS[idx];

    // Build SVG
    svgEl.innerHTML = lv.svgContent();

    // Set all data-region elements to uncolored
    svgEl.querySelectorAll('[data-region]').forEach(el => {
        el.style.fill = '#d0d0d8';
    });

    // Decorative elements: no pointer events, transparent stroke unless specified
    svgEl.querySelectorAll('.deco').forEach(el => {
        el.style.pointerEvents = 'none';
    });

    // Attach click handlers
    svgEl.querySelectorAll('[data-region]').forEach(el => {
        el.addEventListener('click', onRegionClick);
        el.addEventListener('touchend', onRegionTouch, { passive: false });
    });

    // Build palette
    buildPalette(lv.palette);

    // Update HUD
    document.getElementById('hud-emoji').textContent = lv.emoji;
    updateProgress();

    showGame();
}

// ═══════════════════════════════════════════════════════
//  PALETTE
// ═══════════════════════════════════════════════════════

function buildPalette(colors) {
    paletteRow.innerHTML = '';
    // Eraser
    const eraser = document.createElement('div');
    eraser.className = 'swatch eraser';
    eraser.textContent = '✕';
    eraser.title = 'Radír';
    eraser.addEventListener('click', () => selectColor(null, eraser));
    eraser.addEventListener('touchend', e => { e.preventDefault(); selectColor(null, eraser); });
    paletteRow.appendChild(eraser);

    colors.forEach(c => {
        const s = document.createElement('div');
        s.className = 'swatch';
        s.style.background = c.color;
        s.style.setProperty('--sc', c.color + '66');
        s.title = c.name;
        s.dataset.color = c.color;

        s.addEventListener('click', () => selectColor(c.color, s));
        s.addEventListener('touchend', e => { e.preventDefault(); selectColor(c.color, s); });

        // Tooltip on hover
        s.addEventListener('mouseenter', () => showTooltip(c.name));
        s.addEventListener('mouseleave', () => hideTooltip());

        paletteRow.appendChild(s);
    });
}

function selectColor(color, btn) {
    selectedColor = color;
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    if (btn) btn.classList.add('active');
}

function showTooltip(name) {
    tooltip.textContent = name;
    tooltip.classList.add('show');
}

function hideTooltip() {
    tooltip.classList.remove('show');
}

// ═══════════════════════════════════════════════════════
//  COLORING
// ═══════════════════════════════════════════════════════

function onRegionClick(e) {
    const regionId = e.currentTarget.dataset.region;
    applyColor(regionId);
}

function onRegionTouch(e) {
    e.preventDefault();
    const regionId = e.currentTarget.dataset.region;
    applyColor(regionId);
}

function applyColor(regionId) {
    if (!selectedColor) {
        // Eraser
        regionColors[regionId] = null;
        svgEl.querySelectorAll(`[data-region="${regionId}"]`).forEach(el => {
            el.style.fill = '#d0d0d8';
        });
        updateProgress();
        return;
    }

    const lv     = LEVELS[currentLevelIdx];
    const region = lv.regions.find(r => r.id === regionId);
    if (!region) return;

    const isCorrect = selectedColor === region.correct;
    const wasCorrect = regionColors[regionId] === region.correct;

    // Count a mistake if wrong color is applied (and it wasn't already wrong)
    if (!isCorrect && !wasCorrect) mistakes++;

    regionColors[regionId] = selectedColor;

    // Apply fill to all matching elements
    svgEl.querySelectorAll(`[data-region="${regionId}"]`).forEach(el => {
        el.style.fill = selectedColor;
        el.classList.remove('correct-flash', 'wrong-flash');
        // Force reflow for animation restart
        void el.offsetWidth;
        el.classList.add(isCorrect ? 'correct-flash' : 'wrong-flash');
    });

    updateProgress();
    updateStarsDisplay();

    // Check win
    if (isWin()) {
        setTimeout(showWin, 700);
    }
}

function isWin() {
    const lv = LEVELS[currentLevelIdx];
    return lv.regions.every(r => regionColors[r.id] === r.correct);
}

function updateProgress() {
    const lv      = LEVELS[currentLevelIdx];
    const total   = lv.regions.length;
    const correct = lv.regions.filter(r => regionColors[r.id] === r.correct).length;
    const pct     = total > 0 ? (correct / total) * 100 : 0;

    progressBar.style.width = pct + '%';
    progressText.textContent = `${correct} / ${total} terület helyes`;
}

function calcStars() {
    if (mistakes === 0) return 3;
    if (mistakes <= 3)  return 2;
    return 1;
}

function updateStarsDisplay() {
    const stars = calcStars();
    starsDisplay.textContent = '★'.repeat(stars) + '☆'.repeat(3 - stars);
}

// ═══════════════════════════════════════════════════════
//  HINT
// ═══════════════════════════════════════════════════════

function showHint() {
    hintsUsed++;
    mistakes += 2; // hint costs 2 mistake points
    updateStarsDisplay();

    const lv = LEVELS[currentLevelIdx];

    // Temporarily apply correct colors with opacity
    svgEl.querySelectorAll('[data-region]').forEach(el => {
        const regionId = el.dataset.region;
        const region   = lv.regions.find(r => r.id === regionId);
        if (!region) return;
        // If not yet correct, flash the correct color at 60% opacity
        if (regionColors[regionId] !== region.correct) {
            el.style.fill   = region.correct;
            el.style.opacity = '0.55';
        }
    });

    clearTimeout(hintTimer);
    hintTimer = setTimeout(() => {
        // Restore actual colors
        svgEl.querySelectorAll('[data-region]').forEach(el => {
            const regionId = el.dataset.region;
            el.style.opacity = '1';
            const applied = regionColors[regionId];
            el.style.fill = applied || '#d0d0d8';
        });
    }, 2200);
}

// ═══════════════════════════════════════════════════════
//  WIN / CELEBRATION
// ═══════════════════════════════════════════════════════

function showWin() {
    const stars  = calcStars();
    const lv     = LEVELS[currentLevelIdx];
    const best   = bestStars[currentLevelIdx] || 0;
    const isNew  = stars > best;

    if (isNew) {
        bestStars[currentLevelIdx] = stars;
        localStorage.setItem('szinezo_stars', JSON.stringify(bestStars));
    }

    document.getElementById('win-emoji').textContent  = lv.emoji;
    document.getElementById('win-title').textContent  = 'Remek munka!';
    document.getElementById('win-sub').textContent    =
        `${lv.name} – ${mistakes} hiba${isNew ? ' · Új rekord! 🎉' : ''}`;
    document.getElementById('win-stars').textContent  = '★'.repeat(stars) + '☆'.repeat(3-stars);

    const hasNext = currentLevelIdx < LEVELS.length - 1;
    document.getElementById('btn-next-level').style.display = hasNext ? 'block' : 'none';

    winModal.classList.add('visible');
    launchConfetti();
}

// ── Confetti ────────────────────────────────────────────
const confCvs = document.getElementById('confetti-canvas');
const confCtx = confCvs.getContext('2d');
let confetti  = [];
let confRaf   = null;

function launchConfetti() {
    confCvs.width  = window.innerWidth;
    confCvs.height = window.innerHeight;
    confetti = [];
    const colors = ['#aa66ff','#00f5ff','#FDD835','#E53935','#66BB6A','#FF8F00','#FFFFFF'];
    for (let i = 0; i < 140; i++) {
        confetti.push({
            x:   Math.random() * confCvs.width,
            y:   -10 - Math.random() * 120,
            vx:  (Math.random() - 0.5) * 3.5,
            vy:  2.5 + Math.random() * 3,
            rot: Math.random() * 360,
            rv:  (Math.random() - 0.5) * 8,
            w:   7 + Math.random() * 8,
            h:   4 + Math.random() * 5,
            color: colors[Math.floor(Math.random() * colors.length)],
            life: 1,
        });
    }
    cancelAnimationFrame(confRaf);
    confRaf = requestAnimationFrame(animConf);
}

function animConf() {
    confCtx.clearRect(0, 0, confCvs.width, confCvs.height);
    confetti.forEach(p => {
        p.x   += p.vx;
        p.y   += p.vy;
        p.rot += p.rv;
        p.vy  += 0.06;
        if (p.y > confCvs.height + 20) p.life = 0;

        confCtx.save();
        confCtx.translate(p.x, p.y);
        confCtx.rotate(p.rot * Math.PI / 180);
        confCtx.fillStyle = p.color;
        confCtx.globalAlpha = Math.min(1, p.life * 2);
        confCtx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        confCtx.restore();
    });
    confetti = confetti.filter(p => p.life > 0);
    if (confetti.length > 0) confRaf = requestAnimationFrame(animConf);
    else confCtx.clearRect(0, 0, confCvs.width, confCvs.height);
}

// ═══════════════════════════════════════════════════════
//  BUTTON WIRING
// ═══════════════════════════════════════════════════════

document.getElementById('btn-hint').addEventListener('click', showHint);
document.getElementById('btn-levels').addEventListener('click', () => {
    clearTimeout(hintTimer);
    showLevelSelect();
});

document.getElementById('btn-next-level').addEventListener('click', () => {
    winModal.classList.remove('visible');
    startLevel(currentLevelIdx + 1);
});

document.getElementById('btn-retry').addEventListener('click', () => {
    winModal.classList.remove('visible');
    startLevel(currentLevelIdx);
});

document.getElementById('btn-to-levels').addEventListener('click', () => {
    winModal.classList.remove('visible');
    showLevelSelect();
});

// ── Resize confetti canvas ──────────────────────────────
window.addEventListener('resize', () => {
    confCvs.width  = window.innerWidth;
    confCvs.height = window.innerHeight;
});

// ── BOOT ────────────────────────────────────────────────
showLevelSelect();
</script>
